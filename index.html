
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金曲點唱機・懷念老歌猜謎</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* 清新日系・和紙暖陽調色盤 */
    --paper:#fbf7f0;        /* 和紙底 */
    --paper-2:#f3ece0;      /* 次層 */
    --card:#ffffff;         /* 卡片面 */
    --line:#ece3d6;         /* 細線 */
    --ink:#4a443c;          /* 主文字・墨灰 */
    --ink-soft:#6f665a;
    --muted:#a99e8e;        /* 次要文字 */
    --matcha:#8eac82;       /* 抹茶綠 */
    --matcha-deep:#6f9163;
    --sakura:#e79aa0;       /* 櫻粉 */
    --sakura-deep:#d97a82;
    --apricot:#e9b572;      /* 杏黃 */
    --shadow:rgba(120,100,75,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:"Noto Sans TC",system-ui,sans-serif;
    background:
      radial-gradient(130% 90% at 50% -10%, #ffffff 0%, var(--paper) 48%, var(--paper-2) 100%);
    background-attachment:fixed;
    color:var(--ink);
    min-height:100vh;
    padding:max(28px,4vw) 18px 64px;
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  .stage{max-width:600px;margin:0 auto;}
  /* ── 招牌 ───────────────────────── */
  .marquee{text-align:center;margin-bottom:26px;}
  .marquee .eyebrow{
    display:inline-block;
    font-size:13px;letter-spacing:.42em;text-indent:.42em;
    color:var(--matcha-deep);font-weight:700;
    background:#eef3e9;border:1px solid #dde7d4;
    padding:6px 16px;border-radius:999px;margin-bottom:16px;
  }
  .marquee h1{
    font-family:"Noto Serif TC",serif;font-weight:900;
    font-size:clamp(34px,9vw,52px);line-height:1.12;
    color:var(--ink);letter-spacing:.04em;
  }
  .marquee h1 .dot{color:var(--sakura-deep);}
  .marquee .sub{
    margin-top:12px;font-size:clamp(15px,4vw,17px);
    color:var(--ink-soft);letter-spacing:.06em;
  }
  /* ── 進度・小圓 ───────────────── */
  .dots{display:flex;justify-content:center;gap:9px;margin:22px 0 24px;flex-wrap:wrap;}
  .dot-i{
    width:11px;height:11px;border-radius:50%;
    background:#e7ddcd;border:1px solid #ddd1bd;transition:all .3s;
  }
  .dot-i.done{background:var(--matcha);border-color:var(--matcha);}
  .dot-i.active{background:var(--sakura);border-color:var(--sakura);transform:scale(1.4);box-shadow:0 0 0 4px rgba(231,154,160,.18);}
  /* ── 主卡 ──────────────────────── */
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:26px;
    padding:clamp(22px,5.5vw,36px) clamp(20px,5vw,34px) clamp(24px,5.5vw,32px);
    box-shadow:0 22px 50px -26px var(--shadow), 0 2px 0 #fff inset;
  }
  .track-no{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
  .track-no .label{
    font-family:"Noto Serif TC",serif;font-size:12px;
    letter-spacing:.32em;color:var(--matcha-deep);text-transform:uppercase;
  }
  .track-no .num{font-family:"Noto Serif TC",serif;font-size:38px;font-weight:900;color:var(--ink);line-height:1;}
  .track-no .of{font-size:15px;color:var(--muted);align-self:flex-end;margin-bottom:4px;}
  .track-no .rule{flex:1;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--line),transparent);}
  /* ── 黑膠 + 遮罩播放區 ───────────── */
  .turntable{display:flex;flex-direction:column;align-items:center;margin:4px 0 22px;}
  .vinyl{
    position:relative;
    width:clamp(146px,44vw,182px);height:clamp(146px,44vw,182px);
    margin-bottom:22px;border-radius:50%;
    background:
      repeating-radial-gradient(circle at 50% 50%, #efe7da 0 2px, #e6dccb 2px 4px);
    box-shadow:0 12px 26px -10px rgba(120,100,75,.35), inset 0 0 0 1px #fff;
    display:flex;align-items:center;justify-content:center;
    animation:spin 9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .vinyl .sheen{
    position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 210deg, transparent 0deg, rgba(255,255,255,.6) 36deg, transparent 96deg, transparent 250deg, rgba(231,154,160,.25) 300deg, transparent 340deg);
  }
  .vinyl .center{
    position:relative;z-index:2;width:38%;height:38%;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--sakura), var(--sakura-deep) 75%);
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 0 0 4px #fff, 0 2px 6px rgba(120,100,75,.25);
  }
  .vinyl .center .q{color:#fff;font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(24px,6.4vw,32px);line-height:1;}
  .player-zone{
    position:relative;width:100%;max-width:360px;margin:0 auto;
    border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#fbf7f0;
  }
  .player-zone iframe{display:block;width:100%;border:0;}
  .cover{
    position:absolute;top:0;left:0;bottom:0;right:56px;
    background:linear-gradient(90deg, #fbf7f0 0%, #fbf7f0 86%, rgba(251,247,240,0) 100%), #fbf7f0;
    display:flex;align-items:center;gap:11px;padding-left:18px;
    pointer-events:none;z-index:3;transition:right .2s ease;
  }
  .player-zone.loading .cover{right:0;}
  .player-zone.loading .loadmask{opacity:1;}
  .loadmask{
    position:absolute;inset:0;z-index:4;background:#fbf7f0;
    display:flex;align-items:center;justify-content:center;gap:10px;
    color:var(--muted);font-size:14px;letter-spacing:.08em;
    opacity:0;pointer-events:none;transition:opacity .15s;
  }
  .loadmask .spin-ico{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--matcha);animation:ld .8s linear infinite;}
  @keyframes ld{to{transform:rotate(360deg);}}
  .cover .ico{font-size:22px;}
  .cover .txt{font-size:15px;color:var(--ink-soft);font-weight:700;letter-spacing:.04em;}
  .play-label{
    font-size:14px;color:var(--ink-soft);letter-spacing:.04em;
    display:flex;align-items:center;gap:7px;margin-top:14px;background:#eef3e9;
    padding:8px 16px;border-radius:999px;border:1px solid #dde7d4;
  }
  .play-label .pin{color:var(--matcha-deep);font-size:14px;}
  /* ── 揭曉按鈕 ──────────────────── */
  .reveals{display:flex;flex-direction:column;gap:14px;margin-top:6px;}
  .btn{
    width:100%;border:none;cursor:pointer;
    font-family:"Noto Sans TC",sans-serif;font-weight:700;border-radius:16px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    transition:transform .12s ease, box-shadow .2s, background .2s, border-color .2s, color .2s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{transform:translateY(1px) scale(.995);}
  .btn:focus-visible{outline:3px solid var(--matcha);outline-offset:3px;}
  .btn-reveal{
    background:#fbf8f2;border:1.5px solid var(--line);color:var(--ink-soft);
    font-size:clamp(18px,4.6vw,21px);padding:18px;
  }
  .btn-reveal:hover{border-color:var(--matcha);color:var(--matcha-deep);background:#f3f7ef;}
  .btn-reveal .k{font-size:13px;letter-spacing:.18em;color:var(--muted);font-weight:700;}
  .answer{overflow:hidden;max-height:0;opacity:0;transition:max-height .5s ease, opacity .35s ease, margin .35s;margin-top:0;}
  .answer.show{max-height:560px;opacity:1;margin-top:12px;}
  .answer .plate{
    background:linear-gradient(135deg,#fdfbf7,#f4efe6);
    border:1px solid var(--line);border-radius:16px;padding:20px 22px;
    display:flex;align-items:baseline;gap:14px;
    box-shadow:0 8px 20px -14px var(--shadow);
  }
  .answer .plate .tag{
    font-family:"Noto Serif TC",serif;font-size:13px;letter-spacing:.16em;
    color:var(--sakura-deep);font-weight:700;white-space:nowrap;
  }
  .answer .plate .val{
    font-family:"Noto Serif TC",serif;font-weight:900;
    font-size:clamp(26px,7vw,34px);color:var(--ink);letter-spacing:.04em;line-height:1.2;
  }
  /* 主唱答案：姓名置中＋小標籤 */
  .answer .plate.singer{flex-direction:column;align-items:center;gap:14px;padding:24px 20px;}
  .answer .plate.singer .portrait{
    width:clamp(150px,48vw,184px);height:clamp(150px,48vw,184px);
    border-radius:18px;object-fit:cover;background:#efe7da;
    box-shadow:0 10px 24px -12px var(--shadow);
  }
  .answer .plate.singer .portrait.hide{display:none;}
  .answer .plate.singer .who{display:flex;align-items:baseline;gap:12px;justify-content:center;}
  .answer .plate.singer .badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  .answer .plate.singer .chip{
    font-size:14px;font-weight:700;letter-spacing:.04em;
    padding:6px 15px;border-radius:999px;
  }
  .answer .plate.singer .chip.lang{background:#eef3e9;color:var(--matcha-deep);border:1px solid #dde7d4;}
  .answer .plate.singer .chip.tt{background:#fbeef0;color:var(--sakura-deep);border:1px solid #f4dde0;}
  /* ── 導覽 ──────────────────────── */
  .nav{display:flex;gap:12px;margin-top:24px;}
  .btn-nav{flex:1;font-size:clamp(16px,4.4vw,19px);padding:16px;}
  .btn-prev{background:#fbf8f2;border:1.5px solid var(--line);color:var(--muted);}
  .btn-prev:hover{color:var(--ink-soft);border-color:var(--muted);}
  .btn-next{
    background:linear-gradient(135deg,var(--matcha),var(--matcha-deep));color:#fff;
    box-shadow:0 12px 24px -12px rgba(111,145,99,.7);
  }
  .btn-next:hover{box-shadow:0 16px 30px -12px rgba(111,145,99,.8);}
  /* ── 結束 ──────────────────────── */
  .finish{display:none;text-align:center;}
  .finish.show{display:block;animation:rise .5s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  .finish .disc{
    width:118px;height:118px;border-radius:50%;margin:0 auto 24px;
    background:repeating-radial-gradient(circle at 50% 50%, #efe7da 0 2px, #e6dccb 2px 4px);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 14px 28px -12px rgba(120,100,75,.35), inset 0 0 0 1px #fff;
  }
  .finish .disc span{font-size:46px;}
  .finish h2{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(28px,7vw,38px);color:var(--matcha-deep);margin-bottom:14px;}
  .finish p{color:var(--ink-soft);font-size:clamp(15px,4vw,17px);margin-bottom:28px;letter-spacing:.04em;}
  .btn-restart{
    background:linear-gradient(135deg,var(--sakura),var(--sakura-deep));color:#fff;
    font-size:18px;padding:16px 40px;width:auto;margin:0 auto;
    box-shadow:0 12px 24px -12px rgba(217,122,130,.7);
  }
  .hidden{display:none!important;}
  @media (prefers-reduced-motion: reduce){.vinyl{animation:none!important;}*{transition:none!important;}}
</style>
</head>
<body>
<div class="stage">
  <div class="marquee">
    <div class="eyebrow">社區長輩・同樂時光</div>
    <h1>金曲點唱機<span class="dot">.</span></h1>
    <div class="sub">聽一段旋律，猜猜這是哪首歌、是誰唱的</div>
  </div>
  <div class="dots" id="dots"></div>
  <!-- 主卡 -->
  <div class="card" id="card">
    <div class="track-no">
      <span class="label">Track</span>
      <span class="num" id="num">1</span>
      <span class="of">／ 10</span>
      <span class="rule"></span>
    </div>
    <div class="turntable">
      <div class="vinyl">
        <span class="sheen"></span>
        <span class="center"><span class="q">♪</span></span>
      </div>
      <div class="player-zone loading" id="playerZone">
        <iframe id="player" allow="encrypted-media; autoplay; fullscreen" loading="lazy"></iframe>
        <div class="cover">
          <span class="ico">🎶</span>
          <span class="txt">神秘曲目</span>
        </div>
        <div class="loadmask"><span class="spin-ico"></span>準備中…</div>
      </div>
      <div class="play-label"><span class="pin">▶</span> 按右側播放鈕，大家一起聽</div>
    </div>
    <div class="reveals">
      <div>
        <button class="btn btn-reveal" id="btnSong"><span class="k">歌名</span> 揭曉答案</button>
        <div class="answer" id="ansSongBox">
          <div class="plate"><span class="tag">歌　名</span><span class="val" id="ansSong"></span></div>
        </div>
      </div>
      <div>
        <button class="btn btn-reveal" id="btnSinger"><span class="k">主唱</span> 揭曉答案</button>
        <div class="answer" id="ansSingerBox">
          <div class="plate singer">
            <img class="portrait" id="ansPortrait" alt="" referrerpolicy="no-referrer">
            <span class="who"><span class="tag">主　唱</span><span class="val" id="ansSinger"></span></span>
            <span class="badges">
              <span class="chip lang" id="ansLang"></span>
              <span class="chip tt" id="ansTitle"></span>
            </span>
          </div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="btn btn-nav btn-prev" id="btnPrev">上一首</button>
      <button class="btn btn-nav btn-next" id="btnNext">下一首</button>
    </div>
  </div>
  <!-- 結束 -->
  <div class="finish" id="finish">
    <div class="disc"><span>🌸</span></div>
    <h2>整場唱完囉</h2>
    <p>十首經典都回味過一遍了，大家辛苦也開心了</p>
    <button class="btn btn-restart" id="btnRestart">再來一輪</button>
  </div>
</div>
<script>
  const songs = [
    {id:"6jLJ86A6xn7URCyYtzzkaE", song:"愛拼才會贏",     singer:"葉啟田", lang:"台語", title:"寶島歌王",     photo:"https://i.scdn.co/image/ab67616d00001e0217c7ce5d27d0c53a5affd31c"},
    {id:"4op5GHCaxKd2nwTBB5NeNg", song:"家後",           singer:"江蕙",   lang:"台語", title:"台語天后・二姐", photo:"https://i.scdn.co/image/ab67616d00001e020d146a714c4f4c27d80ec29e"},
    {id:"6kdnxlGoAZyizAc6mjwl0t", song:"思慕的人",       singer:"洪一峰", lang:"台語", title:"寶島低音歌王", photo:"https://i.scdn.co/image/ab67616d00001e026a3bcc12e63f279924c9917d"},
    {id:"1V6yCSlNoDirpXDK7Hesef", song:"月亮代表我的心", singer:"鄧麗君", lang:"國語", title:"一代歌后",     photo:"https://i.scdn.co/image/ab6761610000517486c570827f130380c52fc614"},
    {id:"4ziL6rx1HkCkXjUINa8r7M", song:"外婆的澎湖灣",   singer:"潘安邦", lang:"國語", title:"校園民歌",     photo:"https://i.scdn.co/image/ab67616d00001e0208f4dae675e82702ab089afe"},
    {id:"2ySf7GPu3RjmZY5000bR9y", song:"心事誰人知",     singer:"沈文程", lang:"台語", title:"金曲歌王",     photo:"https://i.scdn.co/image/ab67616d00001e0227dcfdd1973fa46cbbb5fc93"},
    {id:"0wDUp07g7UEKdNf5isACA5", song:"橄欖樹",         singer:"齊豫",   lang:"國語", title:"天籟美聲",     photo:"https://i.scdn.co/image/ab6761610000517434e7544572b23b9672853f46"},
    {id:"1VgDPPfTWrdirtfouwGC9O", song:"孤女的願望",     singer:"陳芬蘭", lang:"台語", title:"寶島歌后",     photo:"https://i.scdn.co/image/ab67616d00001e025f4daa7b94eb70031f7ed3c2"},
    {id:"3SjzXshPHwFSE6JIK1daqw", song:"龍的傳人",       singer:"李建復", lang:"國語", title:"校園民歌",     photo:"https://i.scdn.co/image/ab67616d00001e02d8b067eb2d864d6bce09a6f1"},
    {id:"3mxll2lYKEnhkbEFpb6txg", song:"綠島小夜曲",     singer:"蔡琴",   lang:"國語", title:"絲絨歌后",     photo:"https://i.scdn.co/image/ab67616d00001e02b23699370b201309a5c15099"}
  ];
  let idx = 0;
  const total = songs.length;
  const $ = id => document.getElementById(id);
  const num=$("num"), player=$("player"), playerZone=$("playerZone"),
        dots=$("dots"), card=$("card"), finish=$("finish"),
        btnPrev=$("btnPrev"), btnNext=$("btnNext"),
        ansSongBox=$("ansSongBox"), ansSingerBox=$("ansSingerBox"),
        ansSong=$("ansSong"), ansSinger=$("ansSinger"),
        ansLang=$("ansLang"), ansTitle=$("ansTitle"), ansPortrait=$("ansPortrait");
  for(let i=0;i<total;i++){
    const d=document.createElement("div");d.className="dot-i";dots.appendChild(d);
  }
  function paintDots(){
    [...dots.children].forEach((d,i)=>{
      d.className="dot-i"+(i<idx?" done":"")+(i===idx?" active":"");
    });
  }
  let loadTimer=null, fillTimer=null;
  function render(){
    const s=songs[idx];
    const myIdx=idx;
    num.textContent=idx+1;
    // 收起並清空答案，避免換歌時閃出
    ansSongBox.classList.remove("show");
    ansSingerBox.classList.remove("show");
    ansSong.textContent=""; ansSinger.textContent="";
    ansLang.textContent=""; ansTitle.textContent="";
    ansPortrait.removeAttribute("src"); ansPortrait.classList.add("hide");
    // 全遮播放器，避免換歌瞬間閃出歌名
    playerZone.classList.add("loading");
    clearTimeout(loadTimer);
    player.height=80;
    player.src="https://open.spotify.com/embed/track/"+s.id+"?utm_source=generator";
    player.onload = ()=>{ clearTimeout(loadTimer); loadTimer=setTimeout(()=> playerZone.classList.remove("loading"), 500); };
    loadTimer=setTimeout(()=> playerZone.classList.remove("loading"), 3000);
    clearTimeout(fillTimer);
    fillTimer=setTimeout(()=>{
      if(myIdx!==idx) return;
      ansSong.textContent=s.song;
      ansSinger.textContent=s.singer;
      ansLang.textContent=s.lang;
      ansTitle.textContent=s.title;
      ansPortrait.onerror = ()=> ansPortrait.classList.add("hide");
      ansPortrait.classList.remove("hide");
      ansPortrait.src = s.photo;
      ansPortrait.alt = s.singer;
    }, 520);
    btnPrev.style.visibility = idx===0 ? "hidden" : "visible";
    btnNext.textContent = idx===total-1 ? "完成" : "下一首";
    paintDots();
  }
  $("btnSong").onclick   = ()=> ansSongBox.classList.add("show");
  $("btnSinger").onclick = ()=> ansSingerBox.classList.add("show");
  btnNext.onclick = ()=>{
    if(idx===total-1){
      card.classList.add("hidden"); dots.classList.add("hidden"); finish.classList.add("show");
    }else{ idx++; render(); }
  };
  btnPrev.onclick = ()=>{ if(idx>0){ idx--; render(); } };
  $("btnRestart").onclick = ()=>{
    idx=0; finish.classList.remove("show");
    card.classList.remove("hidden"); dots.classList.remove("hidden"); render();
  };
  render();
</script>
</body>
</html>
